<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker | Homepage</title>
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind CSS and Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      .geist {
        font-family: "Geist", sans-serif;
        font-optical-sizing: auto;
        font-style: normal;
      }
    </style>
  </head>
  <body class="geist">
    <header class="bg-base-100 shadow-sm">
      <nav>
        <div class="navbar flex justify-between container mx-auto">
          <div class="flex items-center gap-2">
            <i
              class="fa-brands fa-github fa-beat"
              style="color: rgb(42, 45, 46)"
            ></i>
            <h2 class="font-bold">GitHub Issues Tracker</h2>
          </div>
          <div class="flex hidden md:inline-flex gap-2 items-center">
            <div class="relative w-50">
              <i
                class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"
              ></i>
              <input
                type="text"
                placeholder="Search issues..."
                class="w-full pl-10 pr-4 py-2 border border-gray-500 rounded-lg focus:outline-none focus:ring-1 focus:ring-blue-400"
              />
            </div>
            <button class="btn btn-primary">
              <i class="fa-solid fa-plus" style="color: rgb(237, 241, 242)"></i>
              New Issue
            </button>
          </div>

          <!-- Drawer -->
          <div class="flex inline-block md:hidden">
            <div class="drawer drawer-end">
              <input id="my-drawer-5" type="checkbox" class="drawer-toggle" />
              <div class="drawer-content">
                <!-- Page content here -->
                <label for="my-drawer-5" class="drawer-button"
                  ><svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    class="inline-block h-6 w-6 stroke-current"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M4 6h16M4 12h16M4 18h16"
                    ></path>
                  </svg>
                </label>
              </div>
              <div class="drawer-side">
                <label
                  for="my-drawer-5"
                  aria-label="close sidebar"
                  class="drawer-overlay"
                ></label>
                <ul class="menu bg-base-200 min-h-full w-50 p-4">
                  <!-- Sidebar content here -->
                  <li>
                    <div class="relative w-full mb-2">
                      <i
                        class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 pl-2"
                      ></i>
                      <input
                        type="text"
                        placeholder="Search issues..."
                        class="w-full pl-8 pr-4 py-2 border border-gray-500 rounded-lg outline-none"
                      />
                    </div>
                  </li>
                  <li>
                    <button class="btn btn-primary w-full">
                      <i
                        class="fa-solid fa-plus"
                        style="color: rgb(237, 241, 242)"
                      ></i>
                      New Issue
                    </button>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </nav>
    </header>
  </body>
</html>
